<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Binayah News Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0d0f12;
    --surface:  #161b22;
    --border:   #21262d;
    --hover:    #1c2128;
    --accent:   #58a6ff;
    --text:     #e6edf3;
    --muted:    #8b949e;
    --badge-bg: #21262d;
    --radius:   8px;
    --font:     -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    gap: 16px;
  }
  .header-left { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
  .logo { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; color: var(--text); }
  .logo span { color: var(--accent); }
  #count-badge {
    font-size: 12px;
    font-weight: 500;
    background: var(--badge-bg);
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 2px 9px;
    border-radius: 20px;
  }
  .search-wrap {
    flex: 1;
    max-width: 420px;
  }
  .search-wrap input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 14px;
    padding: 7px 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-wrap input:focus { border-color: var(--accent); }

  /* ── Source filter strip ── */
  #filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 14px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .filter-btn {
    flex-shrink: 0;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 13px;
    font-family: var(--font);
    padding: 5px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0d0f12;
    font-weight: 600;
  }

  /* ── Grid ── */
  main { padding: 24px 32px; }
  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    transition: border-color 0.15s, transform 0.15s;
    text-decoration: none;
    color: inherit;
  }
  .card:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
  }
  .card-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .source-badge {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 4px;
    background: var(--badge-bg);
    color: var(--accent);
    border: 1px solid rgba(88,166,255,0.25);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 150px;
  }
  .card-date {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .card-title {
    font-size: 14px;
    font-weight: 500;
    line-height: 1.5;
    color: var(--text);
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-image {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    border-radius: 5px;
    background: var(--border);
    display: block;
  }
  .card-image-placeholder {
    width: 100%;
    aspect-ratio: 16/9;
    border-radius: 5px;
    background: linear-gradient(135deg, #1a2332 0%, #0d1520 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 6px;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }
  .card-summary {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .body-toggle {
    align-self: flex-start;
    background: rgba(63,185,80,0.15);
    border: 1px solid rgba(63,185,80,0.5);
    border-radius: 4px;
    color: #3fb950;
    cursor: pointer;
    font-family: var(--font);
    font-size: 11px;
    font-weight: 600;
    padding: 4px 12px;
    transition: all 0.15s;
    letter-spacing: 0.2px;
  }
  .body-toggle:hover { background: rgba(63,185,80,0.28); border-color: #3fb950; }
  .body-toggle.paywall {
    background: rgba(255,165,0,0.12);
    border-color: rgba(255,165,0,0.45);
    color: #f0a040;
    cursor: default;
  }
  .body-toggle.paywall:hover { background: rgba(255,165,0,0.18); border-color: #f0a040; }
  .card-body {
    display: none;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    border-top: 1px solid var(--border);
    padding-top: 10px;
    margin-top: 2px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .card-body.open { display: block; }

  /* ── States ── */
  #loading, #empty {
    grid-column: 1 / -1;
    padding: 60px 0;
    text-align: center;
    color: var(--muted);
    font-size: 15px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #status-bar {
    font-size: 12px;
    color: var(--muted);
    padding: 8px 32px 0;
  }

  .week-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    flex-shrink: 0;
    white-space: nowrap;
    user-select: none;
  }
  .week-toggle input { accent-color: var(--accent); cursor: pointer; }
  .week-toggle:hover { color: var(--text); }

  @media (max-width: 600px) {
    header { padding: 14px 16px; flex-wrap: wrap; }
    #filters { padding: 10px 16px; }
    main { padding: 16px; }
    #grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">Binayah <span>News</span></div>
    <span id="count-badge">loading…</span>
  </div>
  <div class="search-wrap">
    <input type="search" id="search" placeholder="Search articles…" autocomplete="off"/>
  </div>
  <label class="week-toggle" title="Show only articles from the last 7 days">
    <input type="checkbox" id="week-only"/> 7 days
  </label>
</header>

<!-- Top tab strip: News | Floor Plans -->
<div id="tabs" style="display:flex;gap:4px;padding:0 32px;border-bottom:1px solid var(--border);background:var(--surface);">
  <button class="tab-btn active" data-tab="news" style="background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);font-size:14px;font-weight:500;padding:12px 16px;cursor:pointer;font-family:var(--font);transition:all 0.15s;">News</button>
  <button class="tab-btn" data-tab="tanami" style="background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);font-size:14px;font-weight:500;padding:12px 16px;cursor:pointer;font-family:var(--font);transition:all 0.15s;">Floor Plans (Tanami)</button>
</div>

<!-- News view -->
<div id="view-news">
  <div id="filters">
    <button class="filter-btn active" data-source="all">All</button>
  </div>
  <div id="status-bar"></div>
  <main>
    <div id="grid">
      <div id="loading"><div class="spinner"></div>Fetching articles…</div>
    </div>
  </main>
</div>

<!-- Tanami floor plans view (hidden by default) -->
<div id="view-tanami" style="display:none;">
  <div id="tanami-status" style="font-size:12px;color:var(--muted);padding:12px 32px 0;"></div>
  <main>
    <div id="tanami-projects" style="padding:24px 32px;display:flex;flex-direction:column;gap:32px;">
      <div style="padding:60px 0;text-align:center;color:var(--muted);"><div class="spinner"></div>Loading floor plans…</div>
    </div>
  </main>
</div>

<style>
  .tab-btn.active { color: var(--text) !important; border-bottom-color: var(--accent) !important; }
  .tab-btn:hover { color: var(--text); }
  .tanami-project { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .tanami-project-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
  .tanami-project-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .tanami-project-meta { font-size: 12px; color: var(--muted); display: flex; gap: 12px; flex-wrap: wrap; }
  .tanami-project-meta span { background: var(--badge-bg); border: 1px solid var(--border); padding: 2px 8px; border-radius: 12px; }
  .tanami-fp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
  .tanami-fp-card { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; transition: border-color 0.15s; cursor: pointer; }
  .tanami-fp-card:hover { border-color: var(--accent); }
  .tanami-fp-img { width: 100%; aspect-ratio: 1/1; object-fit: contain; background: #fff; display: block; }
  .tanami-fp-info { padding: 10px 12px; font-size: 11px; color: var(--muted); line-height: 1.4; }
  .tanami-fp-info strong { color: var(--text); font-weight: 500; }
  .tanami-refresh-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); font-size: 12px; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-family: var(--font); }
  .tanami-refresh-btn:hover { border-color: var(--accent); color: var(--text); }
</style>

<script>
const API = "https://binayah-news-scraper.onrender.com/news?limit=1000";

let allArticles = [];
let activeSource = "all";
let searchQuery  = "";
let weekOnly     = false;

// ── Fetch ──────────────────────────────────────────────────────────────────
async function loadArticles() {
  try {
    const res = await fetch(API);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    allArticles = data.articles || [];

    const fetchedAt = data.fetchedAt ? new Date(data.fetchedAt) : new Date();
    document.getElementById("status-bar").textContent =
      "Cache updated " + timeAgo(fetchedAt) + " · " + allArticles.length + " articles indexed";

    buildFilters();
    render();
  } catch (e) {
    document.getElementById("grid").innerHTML =
      `<div id="loading">Failed to load articles: ${e.message}</div>`;
  }
}

// ── Filters ────────────────────────────────────────────────────────────────
function buildFilters() {
  const sources = ["all", ...new Set(allArticles.map(a => a.source))];
  const strip = document.getElementById("filters");
  strip.innerHTML = sources.map(s =>
    `<button class="filter-btn${s === activeSource ? " active" : ""}" data-source="${s}">
      ${s === "all" ? "All" : s}
    </button>`
  ).join("");
  strip.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      activeSource = btn.dataset.source;
      strip.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      render();
    });
  });
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  const q = searchQuery.trim().toLowerCase();
  const weekCutoff = Date.now() - 7 * 24 * 60 * 60 * 1000;
  const visible = allArticles.filter(a => {
    if (activeSource !== "all" && a.source !== activeSource) return false;
    if (q && !a.title.toLowerCase().includes(q)) return false;
    if (weekOnly && new Date(a.publishedAt).getTime() < weekCutoff) return false;
    return true;
  });

  document.getElementById("count-badge").textContent =
    visible.length + " article" + (visible.length !== 1 ? "s" : "");

  const grid = document.getElementById("grid");
  if (!visible.length) {
    grid.innerHTML = `<div id="empty">No articles match your filters.</div>`;
    return;
  }
  cardIdx = 0;
  grid.innerHTML = visible.map(card).join("");
}

// ── Card HTML ──────────────────────────────────────────────────────────────
const SOURCE_ICONS = {
  "Arabian Business": "💼", "Gulf News": "📰", "Khaleej Times": "🗞️",
  "Zawya": "📊", "Economy Middle East": "📈", "Gulf Business": "🏢",
  "Reuters": "🌐", "Emirates247": "✈️", "Trade Arabia": "🏗️",
  "Construction Week": "🏗️", "Property Finder": "🏠",
};

let cardIdx = 0;
function card(a) {
  const date = a.publishedAt ? timeAgo(new Date(a.publishedAt)) : "";
  const idx = cardIdx++;
  let imgHtml;
  if (a.imageUrl) {
    imgHtml = `<img class="card-image" src="${esc(a.imageUrl)}" alt="" loading="lazy"
      onerror="this.outerHTML='<div class=\\'card-image-placeholder\\'><span style=\\'font-size:22px\\'>${SOURCE_ICONS[a.source]||'📰'}</span><span>${esc(a.source)}</span></div>'"/>`;
  } else {
    const icon = SOURCE_ICONS[a.source] || "📰";
    imgHtml = `<div class="card-image-placeholder"><span style="font-size:22px">${icon}</span><span>${esc(a.source)}</span></div>`;
  }
  const summary = a.summary
    ? `<div class="card-summary">${esc(a.summary)}</div>`
    : "";
  const PAYWALLED = ["Reuters"];
  let bodyHtml = "";
  if (a.body) {
    bodyHtml = `<button class="body-toggle" onclick="toggleBody(event,${idx})">📄 Show scraped content</button>
                <div class="card-body" id="body-${idx}">${esc(a.body)}</div>`;
  } else if (PAYWALLED.includes(a.source)) {
    bodyHtml = `<button class="body-toggle paywall" disabled>Content behind paywall</button>`;
  }
  return `
    <div class="card" data-url="${esc(a.url)}">
      <a href="${esc(a.url)}" target="_blank" rel="noopener noreferrer" style="text-decoration:none;color:inherit;display:contents">
        ${imgHtml}
        <div class="card-meta">
          <span class="source-badge">${esc(a.source)}</span>
          <span class="card-date">${date}</span>
        </div>
        <div class="card-title">${esc(a.title)}</div>
        ${summary}
      </a>
      ${bodyHtml}
    </div>`;
}

function toggleBody(e, idx) {
  e.stopPropagation();
  const el = document.getElementById("body-" + idx);
  const btn = e.currentTarget;
  const open = el.classList.toggle("open");
  btn.textContent = open ? "🔼 Hide content" : "📄 Show scraped content";
}

// ── Helpers ────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function timeAgo(date) {
  const diff = (Date.now() - date) / 1000;
  if (diff < 60)   return "just now";
  if (diff < 3600) return Math.floor(diff / 60) + "m ago";
  if (diff < 86400) return Math.floor(diff / 3600) + "h ago";
  return Math.floor(diff / 86400) + "d ago";
}

// ── Search ────────────────────────────────────────────────────────────────
let debounceTimer;
document.getElementById("search").addEventListener("input", e => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    searchQuery = e.target.value;
    render();
  }, 200);
});

document.getElementById("week-only").addEventListener("change", e => {
  weekOnly = e.target.checked;
  render();
});

loadArticles();

// ── Tanami Floor Plans tab ────────────────────────────────────────────────
const TANAMI_API = "https://binayah-news-scraper.onrender.com/tanami";
let tanamiLoaded = false;

async function loadTanami(forceRefresh = false) {
  const statusEl = document.getElementById("tanami-status");
  const gridEl = document.getElementById("tanami-projects");
  statusEl.textContent = forceRefresh ? "Triggering refresh…" : "Loading floor plans…";
  try {
    const res = await fetch(TANAMI_API + (forceRefresh ? "?refresh=1" : ""));
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    const projects = data.projects || [];
    const fetched = data.fetchedAt ? new Date(data.fetchedAt) : null;
    const totalPlans = projects.reduce((n, p) => n + (p.floorPlans?.length || 0), 0);

    statusEl.innerHTML =
      `${projects.length} projects · ${totalPlans} floor plans` +
      (fetched ? ` · updated ${timeAgo(fetched)}` : "") +
      (data.refreshing ? ' · <span style="color:#f0a040">refreshing in background…</span>' : "") +
      ` <button class="tanami-refresh-btn" onclick="loadTanami(true)">↻ Refresh</button>`;

    if (!projects.length) {
      gridEl.innerHTML = `<div style="padding:60px 0;text-align:center;color:var(--muted);">${data.refreshing ? "Scraping… this takes a few minutes on first run." : "No floor plans yet."}</div>`;
      return;
    }

    gridEl.innerHTML = projects
      .filter((p) => !p.error)
      .map((p) => {
        const meta = p.summary || {};
        const metaPills = [
          meta.property_type,
          meta.unit_type,
          meta.size,
          meta.handover ? `Handover: ${meta.handover}` : null,
          meta.payment_plan ? `Payment: ${meta.payment_plan}` : null,
        ].filter(Boolean);
        const plans = p.floorPlans || [];
        const planCards = plans
          .map(
            (fp) => `
          <a class="tanami-fp-card" href="${esc(fp.imageUrl || fp.originalImageUrl || "#")}" target="_blank" rel="noopener noreferrer">
            <img class="tanami-fp-img" src="${esc(fp.imageUrl || fp.originalImageUrl || "")}" alt="${esc(fp.alt || "")}" loading="lazy"/>
            <div class="tanami-fp-info">
              <strong>${esc(fp.unitType || fp.category || "Layout")}</strong><br/>
              ${esc(fp.floorDetails || "")}<br/>
              ${esc(fp.sizes || "")}
            </div>
          </a>`
          )
          .join("");
        return `
          <div class="tanami-project">
            <div class="tanami-project-header">
              <div>
                <div class="tanami-project-title">${esc(p.title || p.slug)}</div>
                <div class="tanami-project-meta">${metaPills.map((m) => `<span>${esc(m)}</span>`).join("")}</div>
              </div>
              <a href="${esc(p.url)}" target="_blank" rel="noopener noreferrer" style="font-size:12px;color:var(--accent);text-decoration:none;">View on Tanami →</a>
            </div>
            ${plans.length ? `<div class="tanami-fp-grid">${planCards}</div>` : '<div style="color:var(--muted);font-size:13px;">No floor plans scraped.</div>'}
          </div>`;
      })
      .join("");
    tanamiLoaded = true;
  } catch (e) {
    statusEl.textContent = "Failed to load: " + e.message;
  }
}

// Tab switching
document.querySelectorAll(".tab-btn").forEach((btn) => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach((b) => b.classList.remove("active"));
    btn.classList.add("active");
    const tab = btn.dataset.tab;
    document.getElementById("view-news").style.display = tab === "news" ? "" : "none";
    document.getElementById("view-tanami").style.display = tab === "tanami" ? "" : "none";
    if (tab === "tanami" && !tanamiLoaded) loadTanami();
  });
});
</script>
</body>
</html>
