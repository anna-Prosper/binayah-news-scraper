<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Binayah News Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0d0f12;
    --surface:  #161b22;
    --border:   #21262d;
    --hover:    #1c2128;
    --accent:   #58a6ff;
    --text:     #e6edf3;
    --muted:    #8b949e;
    --badge-bg: #21262d;
    --radius:   8px;
    --font:     -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    gap: 16px;
  }
  .header-left { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
  .logo { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; color: var(--text); }
  .logo span { color: var(--accent); }
  #count-badge {
    font-size: 12px;
    font-weight: 500;
    background: var(--badge-bg);
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 2px 9px;
    border-radius: 20px;
  }
  .search-wrap {
    flex: 1;
    max-width: 420px;
  }
  .search-wrap input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 14px;
    padding: 7px 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-wrap input:focus { border-color: var(--accent); }

  /* ── Source filter strip ── */
  #filters {
    display: flex;
    gap: 8px;
    padding: 14px 32px;
    overflow-x: auto;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    scrollbar-width: none;
  }
  #filters::-webkit-scrollbar { display: none; }
  .filter-btn {
    flex-shrink: 0;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 13px;
    font-family: var(--font);
    padding: 5px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0d0f12;
    font-weight: 600;
  }

  /* ── Grid ── */
  main { padding: 24px 32px; }
  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    transition: border-color 0.15s, transform 0.15s;
    text-decoration: none;
    color: inherit;
  }
  .card:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
  }
  .card-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .source-badge {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 4px;
    background: var(--badge-bg);
    color: var(--accent);
    border: 1px solid rgba(88,166,255,0.25);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 150px;
  }
  .card-date {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .card-title {
    font-size: 14px;
    font-weight: 500;
    line-height: 1.5;
    color: var(--text);
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-summary {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ── States ── */
  #loading, #empty {
    grid-column: 1 / -1;
    padding: 60px 0;
    text-align: center;
    color: var(--muted);
    font-size: 15px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #status-bar {
    font-size: 12px;
    color: var(--muted);
    padding: 8px 32px 0;
  }

  @media (max-width: 600px) {
    header { padding: 14px 16px; flex-wrap: wrap; }
    #filters { padding: 10px 16px; }
    main { padding: 16px; }
    #grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">Binayah <span>News</span></div>
    <span id="count-badge">loading…</span>
  </div>
  <div class="search-wrap">
    <input type="search" id="search" placeholder="Search articles…" autocomplete="off"/>
  </div>
</header>

<div id="filters">
  <button class="filter-btn active" data-source="all">All</button>
</div>

<div id="status-bar"></div>

<main>
  <div id="grid">
    <div id="loading"><div class="spinner"></div>Fetching articles…</div>
  </div>
</main>

<script>
const API = "https://binayah-news-scraper.onrender.com/news?limit=200";

let allArticles = [];
let activeSource = "all";
let searchQuery  = "";

// ── Fetch ──────────────────────────────────────────────────────────────────
async function loadArticles() {
  try {
    const res = await fetch(API);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    allArticles = data.articles || [];

    const fetchedAt = data.fetchedAt ? new Date(data.fetchedAt) : new Date();
    document.getElementById("status-bar").textContent =
      "Cache updated " + timeAgo(fetchedAt) + " · " + allArticles.length + " articles indexed";

    buildFilters();
    render();
  } catch (e) {
    document.getElementById("grid").innerHTML =
      `<div id="loading">Failed to load articles: ${e.message}</div>`;
  }
}

// ── Filters ────────────────────────────────────────────────────────────────
function buildFilters() {
  const sources = ["all", ...new Set(allArticles.map(a => a.source))];
  const strip = document.getElementById("filters");
  strip.innerHTML = sources.map(s =>
    `<button class="filter-btn${s === activeSource ? " active" : ""}" data-source="${s}">
      ${s === "all" ? "All" : s}
    </button>`
  ).join("");
  strip.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      activeSource = btn.dataset.source;
      strip.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      render();
    });
  });
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  const q = searchQuery.trim().toLowerCase();
  const visible = allArticles.filter(a => {
    if (activeSource !== "all" && a.source !== activeSource) return false;
    if (q && !a.title.toLowerCase().includes(q)) return false;
    return true;
  });

  document.getElementById("count-badge").textContent =
    visible.length + " article" + (visible.length !== 1 ? "s" : "");

  const grid = document.getElementById("grid");
  if (!visible.length) {
    grid.innerHTML = `<div id="empty">No articles match your filters.</div>`;
    return;
  }
  grid.innerHTML = visible.map(card).join("");
}

// ── Card HTML ──────────────────────────────────────────────────────────────
function card(a) {
  const date = a.publishedAt ? timeAgo(new Date(a.publishedAt)) : "";
  const summary = a.summary
    ? `<div class="card-summary">${esc(a.summary)}</div>`
    : "";
  return `
    <a class="card" href="${esc(a.url)}" target="_blank" rel="noopener noreferrer">
      <div class="card-meta">
        <span class="source-badge">${esc(a.source)}</span>
        <span class="card-date">${date}</span>
      </div>
      <div class="card-title">${esc(a.title)}</div>
      ${summary}
    </a>`;
}

// ── Helpers ────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function timeAgo(date) {
  const diff = (Date.now() - date) / 1000;
  if (diff < 60)   return "just now";
  if (diff < 3600) return Math.floor(diff / 60) + "m ago";
  if (diff < 86400) return Math.floor(diff / 3600) + "h ago";
  return Math.floor(diff / 86400) + "d ago";
}

// ── Search ────────────────────────────────────────────────────────────────
let debounceTimer;
document.getElementById("search").addEventListener("input", e => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    searchQuery = e.target.value;
    render();
  }, 200);
});

loadArticles();
</script>
</body>
</html>
